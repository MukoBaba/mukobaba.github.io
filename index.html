<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MukoCan Chat</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: Arial, sans-serif; background: #0f0620; color: #fff; min-height: 100vh; }
    .wrap { max-width: 500px; margin: 0 auto; padding: 16px; }
    h1 { color: #ffd54a; text-align: center; margin-bottom: 4px; font-size: 26px; }
    .subtitle { color: #aa98d9; text-align: center; font-size: 13px; margin-bottom: 20px; }
    .card { background: #1a0b33; border: 1px solid #3d216d; border-radius: 16px; padding: 20px; margin-bottom: 16px; }
    input { width: 100%; padding: 12px; border-radius: 10px; border: 1px solid #53308b; background: #120824; color: #fff; margin-top: 10px; font-size: 16px; outline: none; }
    input:focus { border-color: #8c52ff; }
    button { width: 100%; padding: 13px; border-radius: 10px; border: none; background: #6a2cff; color: #fff; font-size: 15px; font-weight: bold; cursor: pointer; margin-top: 10px; }
    button:hover { opacity: 0.9; }
    .btn-gray { background: #3d1a7a; }
    .btn-red { background: #7a1010; }
    .hidden { display: none; }
    .error { color: #ff6b6b; font-size: 13px; background: rgba(255,0,0,0.1); padding: 8px; border-radius: 8px; margin-top: 8px; }
    .status { color: #7dffbc; font-size: 13px; text-align: center; margin: 5px 0; }
    .section-title { color: #ffd54a; font-size: 15px; font-weight: bold; margin-bottom: 12px; }
    .oda-item { background: #120824; border: 1px solid #3d216d; border-radius: 12px; padding: 14px 16px; margin-bottom: 10px; cursor: pointer; display: flex; align-items: center; justify-content: space-between; transition: border-color 0.2s; }
    .oda-item:hover { border-color: #8c52ff; }
    .oda-adi { font-size: 16px; font-weight: bold; color: #fff; }
    .oda-info { font-size: 12px; color: #aa98d9; margin-top: 3px; }
    .oda-bos { color: #aa98d9; font-size: 14px; text-align: center; padding: 20px; }
    .yeni-btn { background: #1f0d3d; border: 1px dashed #53308b; border-radius: 12px; padding: 14px; text-align: center; cursor: pointer; color: #aa98d9; font-size: 14px; margin-bottom: 16px; }
    .yeni-btn:hover { border-color: #8c52ff; color: #fff; }
    .chat-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 6px; }
    .chat-header h2 { color: #ffd54a; font-size: 18px; }
    .chat-box { height: 320px; overflow-y: auto; background: #120824; border: 1px solid #53308b; border-radius: 10px; padding: 10px; margin: 8px 0; }
    .msg { background: #241046; border-left: 3px solid #8c52ff; border-radius: 8px; padding: 8px 12px; margin-bottom: 8px; }
    .msg.benim { border-left-color: #ffd54a; background: #1f1000; }
    .isim { color: #ffd54a; font-size: 12px; font-weight: bold; }
    .msg.benim .isim { color: #ffb300; }
    .icerik { color: #fff; font-size: 15px; margin-top: 2px; }
    .saat { color: #aa98d9; font-size: 11px; }
    .row { display: flex; gap: 8px; margin-top: 10px; }
    .row input { flex: 1; margin-top: 0; }
    .row button { width: auto; padding: 12px 18px; margin-top: 0; flex-shrink: 0; }
    .yonetici-kutu { background: rgba(255,200,0,0.07); border: 1px solid #7a5c00; border-radius: 10px; padding: 10px 14px; margin-top: 10px; font-size: 13px; color: #ffd54a; }
    .label { font-size: 12px; color: #aa98d9; margin-top: 12px; margin-bottom: -6px; display: block; }

    /* ÇEVRİMİÇİ LİSTESİ */
    .online-bar { background: #0d0820; border: 1px solid #2a1f4a; border-radius: 10px; padding: 8px 12px; margin: 6px 0; display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
    .online-baslik { font-size: 12px; color: #7dffbc; font-weight: bold; flex-shrink: 0; }
    .online-kisi { display: inline-flex; align-items: center; gap: 4px; background: #1a0b33; border-radius: 20px; padding: 3px 10px; font-size: 12px; color: #fff; }
    .online-nokta { width: 7px; height: 7px; border-radius: 50%; background: #7dffbc; box-shadow: 0 0 5px #7dffbc; flex-shrink: 0; }
  </style>
</head>
<body>
<div class="wrap">

  <!-- ANA SAYFA -->
  <div id="anaSayfa">
    <div style="padding-top:16px">
      <h1>MukoCan Chat</h1>
      <div class="subtitle">Bir odaya gir veya yeni oda oluştur</div>
    </div>
    <div class="yeni-btn" onclick="yeniOdaGoster()">+ Yeni Oda Oluştur</div>
    <div class="card hidden" id="yeniOdaForm">
      <div class="section-title">Yeni Oda Oluştur</div>
      <span class="label">Oda adı</span>
      <input id="yeniAd" type="text" placeholder="Oda adı" />
      <span class="label">Giriş şifresi (opsiyonel)</span>
      <input id="yeniSifre" type="password" placeholder="Şifresiz bırakabilirsin" />
      <span class="label">Yönetici anahtarı (odayı silmek için)</span>
      <input id="yeniYoneticiKey" type="password" placeholder="Gizli anahtar belirle" />
      <span class="label">Takma ismin</span>
      <input id="yeniIsim" type="text" placeholder="Takma ismin" />
      <button onclick="odaOlustur()">Odayı Oluştur ve Gir</button>
      <button class="btn-gray" onclick="yeniOdaGizle()">İptal</button>
      <div id="yeniErr" class="error hidden"></div>
    </div>
    <div class="card">
      <div class="section-title">Odalar</div>
      <div id="odaListesi"><div class="oda-bos">Yükleniyor...</div></div>
    </div>
  </div>

  <!-- ŞİFRE EKRANI -->
  <div id="sifreSayfasi" class="hidden">
    <div class="card" style="margin-top:40px">
      <h1 id="sifreOdaAdi">Oda</h1>
      <div class="subtitle">Bu oda şifreli</div>
      <input id="sifreGir" type="password" placeholder="Giriş şifresi" />
      <input id="sifreIsim" type="text" placeholder="Takma ismin" />
      <button onclick="sifreDogrula()">Gir</button>
      <button class="btn-gray" onclick="anaSayfayaDon()">Geri</button>
      <div id="sifreErr" class="error hidden"></div>
    </div>
  </div>

  <!-- İSİM EKRANI -->
  <div id="isimSayfasi" class="hidden">
    <div class="card" style="margin-top:40px">
      <h1 id="isimOdaAdi">Oda</h1>
      <input id="isimGir" type="text" placeholder="Takma ismin" />
      <button onclick="isimleGir()">Odaya Gir</button>
      <button class="btn-gray" onclick="anaSayfayaDon()">Geri</button>
      <div id="isimErr" class="error hidden"></div>
    </div>
  </div>

  <!-- SOHBET -->
  <div id="chatSayfasi" class="hidden">
    <div class="card" style="padding-bottom:10px">
      <div class="chat-header">
        <h2 id="chatOdaAdi">Oda</h2>
        <div style="display:flex;gap:6px;align-items:center">
          <span id="chatIsimGoster" style="color:#aa98d9;font-size:13px"></span>
          <button onclick="cik()" style="width:auto;padding:7px 12px;margin-top:0;background:#3d1a7a;font-size:13px">Çık</button>
        </div>
      </div>
      <div class="status" id="durumYazi">Bağlanıyor...</div>

      <!-- ÇEVRİMİÇİ BAR -->
      <div class="online-bar">
        <span class="online-baslik">🟢 Çevrimiçi:</span>
        <div id="onlineListesi" style="display:flex;gap:6px;flex-wrap:wrap"></div>
      </div>

      <div class="chat-box" id="mesajlar"></div>
      <div id="chatErr" class="error hidden"></div>
      <div class="row">
        <input id="mesajIn" type="text" placeholder="Mesaj yaz..." />
        <button onclick="gonder()" id="gonderBtn" style="width:auto;padding:12px 18px;margin-top:0">Gönder</button>
      </div>

      <div id="yoneticiPanel" class="yonetici-kutu hidden">
        ⭐ Sen bu odanın yöneticisisin
        <button class="btn-red" style="margin-top:8px;font-size:13px;padding:10px" onclick="odaSil()">🗑️ Odayı Sil</button>
      </div>
      <div id="yoneticiGiris" style="margin-top:10px">
        <div style="display:flex;gap:8px">
          <input id="yoneticiKeyGir" type="password" placeholder="Yönetici anahtarı" style="margin-top:0;font-size:13px" />
          <button onclick="yoneticiDogrula()" style="width:auto;padding:10px 14px;margin-top:0;font-size:13px;background:#3d1a7a">Doğrula</button>
        </div>
        <div id="yoneticiErr" class="error hidden"></div>
      </div>
    </div>
  </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const URL_ = "https://zxlbfzfccbdciqdmqmsy.supabase.co";
const KEY_ = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inp4bGJmemZjY2JkY2lxZG1xbXN5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMyNTg4NDUsImV4cCI6MjA4ODgzNDg0NX0.4QmR0PGik--bMaSL7LugNAgxZsyzgFOiuXxh8B8V9FM";
const sb = window.supabase.createClient(URL_, KEY_);

let aktifOda = null, aktifIsim = "", timer = null, presenceTimer = null, presenceId = null, yoneticiMi = false;

function safe(s) { const d = document.createElement("div"); d.textContent = s; return d.innerHTML; }
function goster(id) { document.getElementById(id).classList.remove("hidden"); }
function gizle(id) { document.getElementById(id).classList.add("hidden"); }
function hata(id, msg) { const e = document.getElementById(id); e.textContent = msg; e.classList.remove("hidden"); }
function hataGizle(id) { document.getElementById(id).classList.add("hidden"); }
function durum(msg) { document.getElementById("durumYazi").textContent = msg; }

async function odalariYukle() {
  const { data, error } = await sb.from("rooms").select("id,name,password,created_at").order("created_at", {ascending: false});
  const liste = document.getElementById("odaListesi");
  if (error || !data || data.length === 0) {
    liste.innerHTML = '<div class="oda-bos">Henüz oda yok. İlk odayı sen oluştur!</div>';
    return;
  }
  liste.innerHTML = "";
  data.forEach(oda => {
    const div = document.createElement("div");
    div.className = "oda-item";
    div.innerHTML = `<div><div class="oda-adi">${safe(oda.name)}</div><div class="oda-info">${oda.password ? "🔒 Şifreli" : "🔓 Açık"}</div></div><div style="font-size:20px">${oda.password ? "🔑" : "➡️"}</div>`;
    div.onclick = () => odayaTikla(oda);
    liste.appendChild(div);
  });
}

function odayaTikla(oda) {
  aktifOda = oda;
  if (oda.password) {
    document.getElementById("sifreOdaAdi").textContent = "# " + oda.name;
    document.getElementById("sifreGir").value = "";
    document.getElementById("sifreIsim").value = "";
    hataGizle("sifreErr");
    gizle("anaSayfa"); goster("sifreSayfasi");
  } else {
    document.getElementById("isimOdaAdi").textContent = "# " + oda.name;
    document.getElementById("isimGir").value = "";
    hataGizle("isimErr");
    gizle("anaSayfa"); goster("isimSayfasi");
  }
}

function sifreDogrula() {
  const sifre = document.getElementById("sifreGir").value.trim();
  const isim = document.getElementById("sifreIsim").value.trim();
  if (!isim) { hata("sifreErr", "Takma isim gir!"); return; }
  if (sifre !== aktifOda.password) { hata("sifreErr", "Şifre yanlış!"); return; }
  aktifIsim = isim; sohbeteGir();
}

function isimleGir() {
  const isim = document.getElementById("isimGir").value.trim();
  if (!isim) { hata("isimErr", "Takma isim gir!"); return; }
  aktifIsim = isim; sohbeteGir();
}

async function sohbeteGir() {
  yoneticiMi = false;
  gizle("sifreSayfasi"); gizle("isimSayfasi");
  goster("chatSayfasi");
  document.getElementById("chatOdaAdi").textContent = "# " + aktifOda.name;
  document.getElementById("chatIsimGoster").textContent = aktifIsim;
  document.getElementById("mesajlar").innerHTML = "";
  gizle("yoneticiPanel"); goster("yoneticiGiris");
  hataGizle("yoneticiErr");
  document.getElementById("yoneticiKeyGir").value = "";
  durum("Yükleniyor...");

  await presenceGir();
  await mesajlariYukle();
  await onlineGuncelle();

  timer = setInterval(async () => { await mesajlariYukle(); await onlineGuncelle(); }, 3000);
  presenceTimer = setInterval(presenceYenile, 10000);
  document.getElementById("mesajIn").focus();
}

// ── PRESENCE ──
async function presenceGir() {
  // Eski kaydı temizle
  if (presenceId) {
    await sb.from("presence").delete().eq("id", presenceId);
    presenceId = null;
  }
  const { data } = await sb.from("presence").insert([{ room_id: aktifOda.id, name: aktifIsim }]).select().single();
  if (data) presenceId = data.id;
}

async function presenceYenile() {
  if (!presenceId) return;
  await sb.from("presence").update({ last_seen: new Date().toISOString() }).eq("id", presenceId);
}

async function presenceCik() {
  if (presenceId) {
    await sb.from("presence").delete().eq("id", presenceId);
    presenceId = null;
  }
}

async function onlineGuncelle() {
  // 30 saniye içinde görünenleri göster
  const sinir = new Date(Date.now() - 30000).toISOString();
  const { data } = await sb.from("presence").select("name").eq("room_id", aktifOda.id).gte("last_seen", sinir);
  const liste = document.getElementById("onlineListesi");
  liste.innerHTML = "";
  (data || []).forEach(p => {
    const span = document.createElement("span");
    span.className = "online-kisi";
    span.innerHTML = `<span class="online-nokta"></span>${safe(p.name)}`;
    liste.appendChild(span);
  });
}

// ── MESAJLAR ──
async function mesajlariYukle() {
  const { data, error } = await sb.from("messages").select("*").eq("room", aktifOda.id).order("created_at", {ascending: true});
  if (error) { durum("Hata!"); return; }
  const box = document.getElementById("mesajlar");
  const mevcutlar = Array.from(box.querySelectorAll(".msg")).map(e => e.dataset.id);
  (data || []).forEach(m => {
    if (!mevcutlar.includes(String(m.id))) {
      const div = document.createElement("div");
      div.className = "msg" + (m.name === aktifIsim ? " benim" : "");
      div.dataset.id = m.id;
      const saat = new Date(m.created_at).toLocaleTimeString("tr-TR", {hour:"2-digit",minute:"2-digit"});
      div.innerHTML = `<div class="isim">${safe(m.name)} <span class="saat">${saat}</span></div><div class="icerik">${safe(m.message)}</div>`;
      box.appendChild(div);
      box.scrollTop = box.scrollHeight;
    }
  });
  durum("✓ Aktif");
}

async function gonder() {
  const text = document.getElementById("mesajIn").value.trim();
  if (!text) return;
  hataGizle("chatErr");
  document.getElementById("gonderBtn").disabled = true;
  document.getElementById("mesajIn").value = "";
  const { error } = await sb.from("messages").insert([{ room: aktifOda.id, name: aktifIsim, message: text }]);
  document.getElementById("gonderBtn").disabled = false;
  if (error) { document.getElementById("mesajIn").value = text; hata("chatErr", "Gönderilemedi: " + error.message); }
  else await mesajlariYukle();
  document.getElementById("mesajIn").focus();
}

// ── YÖNETİCİ ──
async function yoneticiDogrula() {
  const key = document.getElementById("yoneticiKeyGir").value.trim();
  if (!key) return;
  const { data } = await sb.from("rooms").select("owner_key").eq("id", aktifOda.id).single();
  if (data && data.owner_key === key) {
    yoneticiMi = true;
    gizle("yoneticiGiris"); goster("yoneticiPanel");
  } else {
    hata("yoneticiErr", "Yanlış anahtar!");
  }
}

async function odaSil() {
  if (!confirm("Odayı silmek istediğine emin misin?")) return;
  await sb.from("presence").delete().eq("room_id", aktifOda.id);
  await sb.from("messages").delete().eq("room", aktifOda.id);
  await sb.from("rooms").delete().eq("id", aktifOda.id);
  cik();
}

// ── YENİ ODA ──
function yeniOdaGoster() { goster("yeniOdaForm"); }
function yeniOdaGizle() { gizle("yeniOdaForm"); }

async function odaOlustur() {
  const ad = document.getElementById("yeniAd").value.trim();
  const sifre = document.getElementById("yeniSifre").value.trim();
  const yKey = document.getElementById("yeniYoneticiKey").value.trim();
  const isim = document.getElementById("yeniIsim").value.trim();
  if (!ad || !isim) { hata("yeniErr", "Oda adı ve takma isim zorunlu!"); return; }
  if (!yKey) { hata("yeniErr", "Yönetici anahtarı belirle!"); return; }
  hataGizle("yeniErr");
  const { data, error } = await sb.from("rooms").insert([{ name: ad, password: sifre || null, owner_key: yKey }]).select().single();
  if (error) { hata("yeniErr", "Hata: " + error.message); return; }
  aktifOda = data; aktifIsim = isim;
  yeniOdaGizle(); gizle("anaSayfa");
  await sohbeteGir();
  yoneticiMi = true;
  gizle("yoneticiGiris"); goster("yoneticiPanel");
}

// ── ÇIKIŞ ──
async function cik() {
  clearInterval(timer); clearInterval(presenceTimer);
  timer = null; presenceTimer = null;
  await presenceCik();
  aktifOda = null; aktifIsim = ""; yoneticiMi = false;
  document.getElementById("mesajlar").innerHTML = "";
  gizle("chatSayfasi"); goster("anaSayfa");
  odalariYukle();
}

function anaSayfayaDon() {
  gizle("sifreSayfasi"); gizle("isimSayfasi");
  goster("anaSayfa");
}

// Sekme/tarayıcı kapanınca presence sil
window.addEventListener("beforeunload", () => {
  if (presenceId) sb.from("presence").delete().eq("id", presenceId);
});

document.addEventListener("keydown", e => {
  if (e.key !== "Enter") return;
  if (!document.getElementById("chatSayfasi").classList.contains("hidden")) gonder();
  else if (!document.getElementById("sifreSayfasi").classList.contains("hidden")) sifreDogrula();
  else if (!document.getElementById("isimSayfasi").classList.contains("hidden")) isimleGir();
  else if (!document.getElementById("yeniOdaForm").classList.contains("hidden")) odaOlustur();
});

odalariYukle();
</script>
</body>
</html>
